<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    BHADOTT Studio — OG Image v2
    1200 x 630 px | Games, AI & Creative Technology
    Converter para PNG: node scripts/convert-og.mjs
  -->
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#03091a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="diamondFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="200" rx="380" ry="320" fill="url(#glowBlue)"/>
  <ellipse cx="1050" cy="440" rx="320" ry="280" fill="url(#glowViolet)"/>
  <ellipse cx="620" cy="315" rx="500" ry="300" fill="url(#glowCenter)"/>

  <!-- Cyber grid — sutil -->
  <g opacity="0.035" stroke="#3b82f6" stroke-width="0.8">
    <!-- Linhas horizontais -->
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <!-- Linhas verticais -->
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Linha neon horizontal superior -->
  <rect x="0" y="0" width="1200" height="1.5" fill="url(#accentLine)"/>
  <!-- Linha neon horizontal inferior -->
  <rect x="0" y="628.5" width="1200" height="1.5" fill="url(#accentLine)"/>

  <!-- Decorações de canto — superior esquerdo -->
  <line x1="32" y1="32" x2="80" y2="32" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="32" y1="32" x2="32" y2="80" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="32" cy="32" r="2.5" fill="#3b82f6" opacity="0.6"/>

  <!-- Decorações de canto — superior direito -->
  <line x1="1168" y1="32" x2="1120" y2="32" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="1168" y1="32" x2="1168" y2="80" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="1168" cy="32" r="2.5" fill="#8b5cf6" opacity="0.6"/>

  <!-- Decorações de canto — inferior esquerdo -->
  <line x1="32" y1="598" x2="80" y2="598" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="32" y1="598" x2="32" y2="550" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="32" cy="598" r="2.5" fill="#3b82f6" opacity="0.6"/>

  <!-- Decorações de canto — inferior direito -->
  <line x1="1168" y1="598" x2="1120" y2="598" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="1168" y1="598" x2="1168" y2="550" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="1168" cy="598" r="2.5" fill="#8b5cf6" opacity="0.6"/>

  <!-- Elementos decorativos direita — esferas orbitais -->
  <g opacity="0.18">
    <!-- Anel externo -->
    <circle cx="1040" cy="315" r="140" stroke="#3b82f6" stroke-width="0.8" fill="none"/>
    <!-- Anel médio -->
    <circle cx="1040" cy="315" r="100" stroke="#8b5cf6" stroke-width="0.8" fill="none" stroke-dasharray="6 4"/>
    <!-- Anel interno -->
    <circle cx="1040" cy="315" r="65" stroke="#3b82f6" stroke-width="0.6" fill="none"/>
    <!-- Núcleo -->
    <circle cx="1040" cy="315" r="28" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Ponto no núcleo -->
    <circle cx="1040" cy="315" r="6" fill="#60a5fa" fill-opacity="0.5"/>
    <!-- Satélites orbitais -->
    <circle cx="1040" cy="175" r="5" fill="#8b5cf6" fill-opacity="0.6"/>
    <circle cx="1040" cy="455" r="5" fill="#3b82f6" fill-opacity="0.6"/>
    <circle cx="900" cy="315" r="5" fill="#8b5cf6" fill-opacity="0.6"/>
    <circle cx="1180" cy="315" r="5" fill="#60a5fa" fill-opacity="0.5"/>
    <!-- Linhas dos satélites -->
    <line x1="1040" y1="287" x2="1040" y2="175" stroke="#8b5cf6" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="1040" y1="343" x2="1040" y2="455" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="1012" y1="315" x2="900" y2="315" stroke="#8b5cf6" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- Logo mark — diamante B -->
  <g transform="translate(112, 228)">
    <!-- Hexágono exterior -->
    <polygon
      points="56,4 106,31 106,85 56,112 6,85 6,31"
      fill="url(#diamondFill)"
      stroke="url(#logoGrad)"
      stroke-width="1.8"
    />
    <!-- Hexágono interior pontilhado -->
    <polygon
      points="56,16 94,38 94,78 56,100 18,78 18,38"
      fill="none"
      stroke="url(#logoGrad)"
      stroke-width="0.8"
      stroke-opacity="0.35"
    />
    <!-- Letra B -->
    <text
      x="56"
      y="72"
      font-family="'Space Grotesk', 'Arial Black', Arial, sans-serif"
      font-weight="900"
      font-size="52"
      text-anchor="middle"
      fill="url(#logoGrad)"
      filter="url(#glow)"
    >B</text>
  </g>

  <!-- Linha vertical separadora -->
  <rect x="248" y="220" width="1.5" height="170" fill="url(#logoGrad)" opacity="0.25"/>

  <!-- Bloco de texto principal -->
  <g transform="translate(280, 0)">
    <!-- Badge "Studio" -->
    <rect x="0" y="218" width="204" height="28" rx="14"
      fill="#3b82f6" fill-opacity="0.1"
      stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text
      x="102" y="237"
      font-family="'Space Grotesk', Arial, sans-serif"
      font-size="12"
      font-weight="600"
      letter-spacing="3"
      text-anchor="middle"
      fill="#60a5fa"
      opacity="0.9"
    >STUDIO</text>

    <!-- Título principal — BHADOTT -->
    <text
      x="0" y="316"
      font-family="'Space Grotesk', 'Arial Black', Arial, sans-serif"
      font-weight="900"
      font-size="96"
      letter-spacing="-1"
      fill="url(#titleGrad)"
      filter="url(#textGlow)"
    >BHADOTT</text>

    <!-- Subtítulo -->
    <text
      x="1" y="364"
      font-family="'Space Grotesk', Arial, sans-serif"
      font-weight="500"
      font-size="28"
      letter-spacing="1"
      fill="#94a3b8"
    >Games · AI · Creative Technology</text>

    <!-- Linha separadora abaixo do subtítulo -->
    <rect x="0" y="390" width="580" height="1" fill="url(#accentLine)" opacity="0.5"/>

    <!-- Chips de serviço -->
    <g transform="translate(0, 406)">
      <!-- Chip 1 -->
      <rect x="0" y="0" width="100" height="26" rx="13" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
      <text x="50" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#60a5fa" letter-spacing="0.5">SaaS Systems</text>
      <!-- Chip 2 -->
      <rect x="112" y="0" width="94" height="26" rx="13" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
      <text x="159" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#a78bfa" letter-spacing="0.5">Mobile Apps</text>
      <!-- Chip 3 -->
      <rect x="218" y="0" width="70" height="26" rx="13" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
      <text x="253" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#60a5fa" letter-spacing="0.5">AI &amp; ML</text>
      <!-- Chip 4 -->
      <rect x="300" y="0" width="72" height="26" rx="13" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
      <text x="336" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#a78bfa" letter-spacing="0.5">Games 3D</text>
      <!-- Chip 5 -->
      <rect x="384" y="0" width="114" height="26" rx="13" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
      <text x="441" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#60a5fa" letter-spacing="0.5">Cloud &amp; DevOps</text>
    </g>
  </g>

  <!-- URL do site — rodapé -->
  <text
    x="600" y="588"
    font-family="'Space Grotesk', Arial, sans-serif"
    font-size="14"
    font-weight="500"
    text-anchor="middle"
    fill="#475569"
    letter-spacing="2"
  >jorgealam.github.io/bhadott-studio</text>

  <!-- Pontinhos decorativos centrais no rodapé -->
  <g transform="translate(600, 605)">
    <circle cx="-20" cy="0" r="2" fill="#3b82f6" opacity="0.25"/>
    <circle cx="-10" cy="0" r="2" fill="#8b5cf6" opacity="0.35"/>
    <circle cx="0"   cy="0" r="2.5" fill="#60a5fa" opacity="0.5"/>
    <circle cx="10"  cy="0" r="2" fill="#8b5cf6" opacity="0.35"/>
    <circle cx="20"  cy="0" r="2" fill="#3b82f6" opacity="0.25"/>
  </g>

  <!-- Neon scan line diagonal sutil -->
  <line x1="-100" y1="0" x2="1300" y2="630" stroke="#3b82f6" stroke-width="60" stroke-opacity="0.012"/>

  <!-- Borda neon do frame inteiro -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="url(#borderGrad)" stroke-width="1.2" opacity="0.4"/>
</svg>
