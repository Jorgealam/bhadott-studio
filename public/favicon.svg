<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#020617"/>
  <!-- Diamond frame -->
  <polygon points="32,6 58,32 32,58 6,32" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <!-- B lettermark -->
  <text x="32" y="41" font-family="Arial Black, sans-serif" font-size="26" font-weight="900"
        fill="url(#g1)" text-anchor="middle" filter="url(#glow)">B</text>
  <!-- Corner dots -->
  <circle cx="32" cy="6"  r="2" fill="#3b82f6" opacity="0.9"/>
  <circle cx="58" cy="32" r="2" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="32" cy="58" r="2" fill="#3b82f6" opacity="0.9"/>
  <circle cx="6"  cy="32" r="2" fill="#8b5cf6" opacity="0.9"/>
</svg>
